<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT Candidate Dashboard - TechSkillio</title>
    <link rel="icon" href="favicon.jpg" type="image/png">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .dashboard-section {
            padding: 40px 0 60px;
            background: #f5f7fa;
            min-height: calc(100vh - 80px);
        }

        /* Dashboard specific layout */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
        }

        @media (max-width: 992px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                margin-top: 30px;
                order: 2;
                /* Ensure sidebar comes after content if needed, though HTML order is Content first */
            }
        }

        @media (max-width: 576px) {
            .dashboard-section {
                padding: 20px 0 40px;
            }

            .dashboard-container {
                padding: 0 15px;
            }

            .welcome-banner {
                padding: 20px;
                flex-direction: column;
                align-items: flex-start;
            }

            .profile-complete-wrapper {
                width: 100%;
                margin-top: 15px;
            }

            .stat-card {
                padding: 15px;
            }

            .stat-number {
                font-size: 24px;
            }

            .job-card {
                padding: 15px;
            }
        }

        /* Welcome Banner */
        .welcome-banner {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .welcome-text h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .welcome-text p {
            color: #666;
            margin-bottom: 15px;
        }

        .profile-complete-wrapper {
            width: 100%;
            max-width: 400px;
        }

        .progress-bar-bg {
            background: #eee;
            height: 10px;
            border-radius: 5px;
            width: 100%;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar-fill {
            background: #3b82f6;
            /* Blue for IT */
            height: 100%;
            border-radius: 5px;
            width: 85%;
            /* Static for now */
        }

        .progress-label {
            font-size: 13px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }

        /* Quick Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 24px;
            color: #3b82f6;
            margin-bottom: 15px;
            background: rgba(59, 130, 246, 0.1);
            width: 60px;
            height: 60px;
            line-height: 60px;
            border-radius: 50%;
            display: inline-block;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        /* Section Headers */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            font-size: 20px;
            color: #2c3e50;
        }

        .view-all-btn {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        .view-all-btn:hover {
            text-decoration: underline;
        }

        /* Job Cards */
        .job-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #3b82f6;
            transition: all 0.2s ease;
        }

        .job-card:hover {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .job-info {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .company-logo {
            width: 50px;
            height: 50px;
            background: #f0f0f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 20px;
        }

        .job-details h3 {
            font-size: 18px;
            margin-bottom: 5px;
            color: #2c3e50;
        }

        .job-meta {
            font-size: 13px;
            color: #666;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .job-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .apply-btn {
            padding: 8px 20px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }

        .apply-btn:hover {
            background: #2563eb;
        }

        /* Sidebar Items */
        .sidebar-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .sidebar-card h3 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #2c3e50;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .status-card {
            background: #f8fafc;
            border-radius: 8px;
            padding: 15px;
            border-left: 3px solid #10b981;
            margin-bottom: 15px;
        }

        .status-role {
            font-weight: 700;
            font-size: 15px;
            color: #2c3e50;
            margin-bottom: 5px;
            display: block;
        }

        .status-time {
            font-size: 13px;
            color: #666;
            font-weight: 500;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-badge {
            font-size: 12px;
            color: #10b981;
            background: rgba(16, 185, 129, 0.1);
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            font-weight: 600;
        }

        .profile-menu-list {
            list-style: none;
            padding: 0;
        }

        .profile-menu-list li {
            margin-bottom: 10px;
        }

        .profile-menu-list a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #f9f9f9;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .profile-menu-list a:hover {
            background: #3b82f6;
            color: white;
        }

        @media (max-width: 480px) {
            .welcome-banner {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }

            .job-card {
                flex-direction: column;
                gap: 20px;
            }

            .apply-btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <script src="js/route-guard.js" data-required-role="user"></script>
    <!-- LOAD HEADER -->
    <div id="header-placeholder"></div>

    <div style="height: 100px;"></div> <!-- Spacer -->

    <section class="dashboard-section">
        <div class="dashboard-container">

            <!-- MAIN CONTENT COL -->
            <div class="main-content">

                <!-- Welcome Banner -->
                <div class="welcome-banner">
                    <div class="welcome-text">
                        <h1>Welcome back, <span id="userNameDisplay">Candidate</span>!</h1>
                        <p>Track your applications for <span style="font-weight: 600;">IT Candidate</span> roles.</p>
                    </div>

                </div>



                <!-- Recommended Jobs -->
                <div class="section-header">
                    <h2>Recommended Jobs (Based on Tech Stack)</h2>
                    <a href="it-jobs.html" class="view-all-btn">View All Jobs →</a>
                </div>

                <div class="jobs-list" id="jobsListContainer">
                    <!-- Jobs will be loaded here -->
                    <div style="text-align: center; padding: 20px; color: #666;">
                        <i class="fas fa-spinner fa-spin"></i> Loading jobs...
                    </div>
                </div>

            </div>

            <!-- SIDEBAR COL -->
            <div class="sidebar">

                <div class="sidebar-card">
                    <h3>User Type</h3>
                    <div
                        style="background: #eff6ff; color: #1e40af; padding: 10px; border-radius: 6px; text-align: center; font-weight: 600;">
                        IT Candidate
                    </div>
                </div>

                <!-- Application Status -->
                <div class="sidebar-card">
                    <h3>Track Application Status</h3>
                    <div id="applicationsListContainer">
                        <div style="text-align: center; padding: 10px; color: #666;">
                            <i class="fas fa-spinner fa-spin"></i> Loading...
                        </div>
                    </div>
                </div>

                <!-- My Profile Menu -->
                <div class="sidebar-card">
                    <h3>My Account</h3>
                    <ul class="profile-menu-list">
                        <li><a href="profile.html"><i class="fas fa-user-circle"></i> View Profile</a></li>
                        <li><a href="profile.html"><i class="fas fa-file-alt"></i> Update Resume</a></li>
                        <li><a href="applied-jobs.html"><i class="fas fa-briefcase"></i> Applied Jobs</a></li>
                        <li><a href="profile.html"><i class="fas fa-cog"></i> Settings</a></li>
                        <li><a href="#" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                    </ul>
                </div>

            </div>
        </div>
    </section>

    <!-- LOAD HEADER SCRIPT -->
    <script src="js/api-config.js"></script>
    <script src="load-header.js"></script>
    <!-- Auth Manager -->
    <script src="js/api-config.js"></script>
    <script src="js/auth-manager.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Load User Info
            const userProfile = JSON.parse(localStorage.getItem('userProfile') || sessionStorage.getItem('userProfile') || '{}');
            if (userProfile.fullName) {
                document.getElementById('userNameDisplay').textContent = userProfile.fullName.split(' ')[0];
            }

            checkAuth();
            loadDashboardData();
        });

        function checkAuth() {
            if (typeof authManager !== 'undefined' && !authManager.isAuthenticated()) {
                window.location.href = 'login.html';
            }
        }

        async function loadDashboardData() {
            try {
                // 1. Fetch Jobs (IT Category)
                const jobsResponse = await authManager.apiRequest('/api/v1/jobs/jobs/?job_category=it');
                const jobsData = await jobsResponse.json();
                const jobs = Array.isArray(jobsData) ? jobsData : (jobsData.results || []);

                // 2. Fetch Applications
                const appsResponse = await authManager.apiRequest('/api/v1/jobs/applications/');
                const appsData = await appsResponse.json();
                const applications = Array.isArray(appsData) ? appsData : (appsData.results || []);

                // Render
                renderJobs(jobs, applications);
                renderApplications(applications);
                updateStats(applications);

            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('jobsListContainer').innerHTML = '<p class="text-danger">Failed to load jobs.</p>';
            }
        }

        function renderJobs(jobs, applications) {
            const container = document.getElementById('jobsListContainer');
            if (jobs.length === 0) {
                container.innerHTML = '<p>No matching jobs found at the moment.</p>';
                return;
            }

            const appliedJobIds = new Set(applications.map(app => app.job || (app.job_details ? app.job_details.id : null))); // Handle different response structures if needed

            // Depending on API response structure for applications list, might need adjustment. 
            // The user provided example response for list of applied jobs has 'id' (application id), 'job_title', etc. 
            // But it doesn't explicitly show 'job_id'. Assuming the response includes job id reference or we strictly check titles? 
            // Wait, logic check: Standard Django implementations usually return the job ID in the application object.
            // User example: 
            // { "id": 8, "job_title": "...", "status": "applied" ... } 
            // Missing 'job' ID field in example? I'll check response in browser if I could, but for now I'll assume standard 
            // patterns or just rely on 'status'.
            // Actually, if I can't check applied status against job ID easily, I might just show "Apply" button.
            // Let's look closer at the user's provided application list example:
            // { "id": 8, "job_title": "...", ... } - No 'job' field? 
            // I'll assume for now I CAN'T easily check if already applied without fetching all application details. 
            // EXCEPT: If the list endpoint returns job id. I'll code safely.

            container.innerHTML = jobs.map(job => {
                const isApplied = applications.some(app => app.job === job.id || app.job_title === job.title); // Fallback to title matching if ID missing

                return `
                <div class="job-card">
                    <div class="job-info">
                        <div class="company-logo"><i class="fas fa-building"></i></div>
                        <div class="job-details">
                            <h3>${job.title}</h3>
                            <div class="job-meta">
                                <span><i class="fas fa-map-marker-alt"></i> ${job.location || 'Remote'}</span>
                                <span><i class="fas fa-rupee-sign"></i> ${formatSalary(job.salary_min, job.salary_max)}</span>
                                <span style="text-transform: capitalize;"><i class="fas fa-briefcase"></i> ${job.data?.employment_type?.replace('_', ' ') || 'Full Time'}</span>
                            </div>
                            <div style="margin-top: 10px; display: flex; gap: 5px; flex-wrap: wrap;">
                                ${(job.skills_required || []).slice(0, 3).map(skill =>
                    `<span style="font-size: 11px; background: #eff6ff; color: #3b82f6; padding: 2px 6px; border-radius: 4px;">${skill}</span>`
                ).join('')}
                            </div>
                        </div>
                    </div>
                    ${isApplied
                        ? '<button class="apply-btn" disabled style="background: #e2e8f0; color: #64748b; cursor: not-allowed;">Applied</button>'
                        : `<button class="apply-btn" onclick="applyJob(${job.id})">Apply Now</button>`
                    }
                </div>
                `;
            }).join('');
        }

        function renderApplications(applications) {
            const container = document.getElementById('applicationsListContainer');
            if (applications.length === 0) {
                container.innerHTML = '<div style="padding: 15px; color: #666; text-align: center;">No active applications</div>';
                return;
            }

            container.innerHTML = applications.slice(0, 5).map(app => `
                <div class="status-card" style="border-left: 3px solid ${getStatusColor(app.status)}">
                    <span class="status-role">${app.job_title || 'Unknown Role'}</span>
                    <div class="status-time"><i class="far fa-clock"></i> Applied on ${new Date(app.applied_at || app.created_at).toLocaleDateString()}</div>
                    <div class="status-badge" style="color: ${getStatusColor(app.status)}; background: ${getStatusWrapperColor(app.status)}">
                        ${(app.status || 'applied').toUpperCase()}
                    </div>
                </div>
            `).join('');
        }

        function updateStats(applications) {
            // Update "Active Applications" count
            // Assuming the stat card is the first one or finding by icon
            const statCards = document.querySelectorAll('.stat-card .stat-number');
            if (statCards.length > 0) statCards[0].textContent = applications.length;
        }

        async function applyJob(jobId) {
            if (!confirm('Are you sure you want to apply for this position?')) return;

            try {
                const button = document.querySelector(`button[onclick="applyJob(${jobId})"]`);
                if (button) {
                    button.disabled = true;
                    button.textContent = 'Applying...';
                }

                const response = await authManager.apiRequest('/api/v1/jobs/applications/', {
                    method: 'POST',
                    body: JSON.stringify({ job: jobId })
                });

                if (response.ok) {
                    // Show success toast or alert
                    alert('Job applied successfully!');
                    // Reload data
                    loadDashboardData();
                } else {
                    const data = await response.json();
                    alert(data.message || 'Failed to apply.');
                    if (button) {
                        button.disabled = false;
                        button.textContent = 'Apply Now';
                    }
                }
            } catch (error) {
                console.error('Apply error:', error);
                alert('An error occurred. Please try again.');
            }
        }

        function logoutUser() {
            if (authManager) authManager.logout();
            else window.location.href = 'login.html';
        }

        // Helpers
        function formatSalary(min, max) {
            if (!min && !max) return 'Not disclosed';
            if (min && max) return `${(min / 100000).toFixed(1)}L - ${(max / 100000).toFixed(1)}L PA`;
            return `${(min || max) / 100000}L PA`;
        }

        function getStatusColor(status) {
            switch ((status || '').toLowerCase()) {
                case 'interview_scheduled': return '#f59e0b';
                case 'rejected': return '#ef4444';
                case 'job_offer': return '#10b981';
                default: return '#3b82f6'; // Applied/Shortlisted
            }
        }

        function getStatusWrapperColor(status) {
            switch ((status || '').toLowerCase()) {
                case 'interview_scheduled': return '#fffbeb';
                case 'rejected': return '#fef2f2';
                case 'job_offer': return '#ecfdf5';
                default: return '#eff6ff';
            }
        }
    </script>
</body>

</html>
