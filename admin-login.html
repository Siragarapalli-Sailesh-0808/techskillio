<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - TechSkillio</title>
    <link rel="icon" href="favicon.jpg" type="image/png">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            position: relative;
            overflow: hidden;
        }

        /* Animated background elements */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 70%, rgba(134, 197, 64, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 70% 30%, rgba(31, 58, 110, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 50% 50%, rgba(134, 197, 64, 0.04) 0%, transparent 70%);
            animation: bgPulse 8s ease-in-out infinite alternate;
            z-index: 0;
        }

        @keyframes bgPulse {
            0% {
                transform: scale(1) rotate(0deg);
            }

            100% {
                transform: scale(1.05) rotate(2deg);
            }
        }

        /* Subtle grid pattern */
        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                linear-gradient(rgba(134, 197, 64, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(134, 197, 64, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: 0;
        }

        .login-container {
            background: rgba(255, 255, 255, 0.97);
            border-radius: 20px;
            padding: 2.5rem 2.5rem 2rem;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4), 0 0 0 1px rgba(134, 197, 64, 0.1);
            max-width: 440px;
            width: 92%;
            position: relative;
            z-index: 1;
            backdrop-filter: blur(10px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #1f3a6e, #152847);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.25rem;
            box-shadow: 0 8px 24px rgba(31, 58, 110, 0.3);
        }

        .login-logo i {
            font-size: 1.8rem;
            color: #86c540;
        }

        .login-header h1 {
            font-size: 1.6rem;
            color: #1f3a6e;
            margin-bottom: 0.3rem;
            font-weight: 700;
        }

        .login-header p {
            color: #94a3b8;
            font-size: 0.9rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            color: #2c3e50;
            font-size: 0.85rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 0.85rem;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            background: #f8fafc;
        }

        .form-group input:focus {
            outline: none;
            border-color: #86c540;
            box-shadow: 0 0 0 3px rgba(134, 197, 64, 0.1);
            background: #fff;
        }

        .form-group input:focus+i,
        .input-wrapper:focus-within i {
            color: #86c540;
        }

        .form-options {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .remember-me input {
            accent-color: #86c540;
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .remember-me label {
            margin: 0;
            font-weight: 400;
            color: #64748b;
            cursor: pointer;
        }

        .btn-login {
            width: 100%;
            padding: 0.85rem;
            background: linear-gradient(135deg, #1f3a6e, #152847);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            letter-spacing: 0.3px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(31, 58, 110, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Error/success messages */
        .login-message {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
            align-items: center;
            gap: 0.5rem;
        }

        .login-message.error {
            display: flex;
            background: #fef2f2;
            color: #dc2626;
            border: 1px solid #fecaca;
        }

        .login-message.success {
            display: flex;
            background: #f0fdf4;
            color: #16a34a;
            border: 1px solid #bbf7d0;
        }

        .login-footer {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.25rem;
            border-top: 1px solid #f1f5f9;
        }

        .login-footer p {
            font-size: 0.8rem;
            color: #94a3b8;
        }

        .login-footer a {
            color: #1f3a6e;
            text-decoration: none;
            font-weight: 600;
        }

        .login-footer a:hover {
            color: #86c540;
        }

        /* Floating particles */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
        }

        .particle:nth-child(1) {
            width: 4px;
            height: 4px;
            background: rgba(134, 197, 64, 0.3);
            top: 20%;
            left: 15%;
            animation: float 6s ease-in-out infinite;
        }

        .particle:nth-child(2) {
            width: 6px;
            height: 6px;
            background: rgba(31, 58, 110, 0.2);
            top: 60%;
            left: 80%;
            animation: float 8s ease-in-out infinite reverse;
        }

        .particle:nth-child(3) {
            width: 3px;
            height: 3px;
            background: rgba(134, 197, 64, 0.2);
            top: 80%;
            left: 25%;
            animation: float 7s ease-in-out infinite 1s;
        }

        .particle:nth-child(4) {
            width: 5px;
            height: 5px;
            background: rgba(31, 58, 110, 0.15);
            top: 30%;
            left: 70%;
            animation: float 9s ease-in-out infinite 2s;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0px) translateX(0px);
                opacity: 0.5;
            }

            50% {
                transform: translateY(-20px) translateX(10px);
                opacity: 1;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem 1.5rem;
                border-radius: 16px;
            }

            .login-header h1 {
                font-size: 1.4rem;
            }
        }
    </style>
</head>

<body>
    <!-- Floating particles for visual depth -->
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="login-container">
        <div class="login-header">
            <div class="login-logo">
                <i class="fas fa-shield-alt"></i>
            </div>
            <h1>Admin Login</h1>
            <p>TechSkillio Admin Panel</p>
        </div>

        <!-- Message area -->
        <div class="login-message" id="loginMessage"></div>

        <form id="adminLoginForm">
            <div class="form-group">
                <label>Email / Username</label>
                <div class="input-wrapper">
                    <input type="text" name="username" required placeholder="Enter your email" autocomplete="username">
                    <i class="fas fa-user"></i>
                </div>
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="input-wrapper">
                    <input type="password" name="password" required placeholder="Enter your password"
                        autocomplete="current-password">
                    <i class="fas fa-lock"></i>
                </div>
            </div>

            <div class="form-options">
                <div class="remember-me">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Login
            </button>
        </form>

        <div class="login-footer">
            <p><a href="index.html">← Back to TechSkillio</a></p>
        </div>
    </div>

    <script src="js/api-config.js"></script>
    <script src="js/auth-manager.js"></script>
    <script>
        const messageEl = document.getElementById('loginMessage');

        function showMessage(text, type = 'error') {
            messageEl.className = 'login-message ' + type;
            messageEl.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i> ${text}`;
        }

        function hideMessage() {
            messageEl.className = 'login-message';
            messageEl.innerHTML = '';
        }

        // If already logged in as admin, redirect to dashboard
        (function checkExistingAuth() {
            const token = localStorage.getItem('access_token');
            const userType = localStorage.getItem('userType');
            if (token && userType) {
                const adminRoles = ['admin', 'superadmin', 'super_admin', 'staff'];
                if (adminRoles.includes(userType.toLowerCase())) {
                    window.location.replace('admin-dashboard.html');
                }
            }
        })();

        document.getElementById('adminLoginForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            hideMessage();

            const username = this.username.value.trim();
            const password = this.password.value;
            const submitBtn = document.getElementById('loginBtn');
            const originalBtnText = submitBtn.innerHTML;

            if (!username || !password) {
                showMessage('Please fill in all required fields.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';

            try {
                const result = await authManager.login(username, password);

                if (result.success) {
                    if (result.data.user_id) localStorage.setItem('userId', result.data.user_id);
                    if (result.data.user_type) localStorage.setItem('userType', result.data.user_type);
                    if (result.data.profile) localStorage.setItem('userProfile', JSON.stringify(result.data.profile));

                    showMessage('Login successful! Redirecting...', 'success');

                    // Check if there's a redirect URL stored
                    const redirectUrl = sessionStorage.getItem('redirectAfterLogin');
                    sessionStorage.removeItem('redirectAfterLogin');

                    setTimeout(() => {
                        window.location.href = redirectUrl || 'admin-dashboard.html';
                    }, 800);
                } else {
                    let errorMessage = result.error || 'Login failed. Please try again.';
                    if (result.status === 401 || result.status === 400) {
                        errorMessage = 'Invalid credentials. Please check your email and password.';
                    } else if (result.status === 403) {
                        errorMessage = 'Access denied. Admin privileges required.';
                    } else if (result.networkError) {
                        errorMessage = 'Unable to connect to server. Please check your connection.';
                    }
                    showMessage(errorMessage);
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalBtnText;
                }
            } catch (error) {
                console.error('Admin login error:', error);
                showMessage('An unexpected error occurred. Please try again.');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
            }
        });
    </script>
</body>

</html>
