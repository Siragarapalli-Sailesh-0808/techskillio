<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subscription Plans - TechSkillio Teacher Recruitment</title>
    <link rel="icon" href="favicon.jpg" type="image/png">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .plans-section {
            padding: 80px 0;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
        }

        .plans-header {
            text-align: center;
            margin-bottom: 4rem;
        }

        .plans-header h1 {
            font-size: 3rem;
            color: #2c3e50;
            margin-bottom: 1rem;
        }

        .plans-header p {
            font-size: 1.2rem;
            color: #64748b;
            max-width: 600px;
            margin: 0 auto;
        }

        .plans-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        .plan-card {
            background: white;
            border-radius: 20px;
            padding: 2.5rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            border: 3px solid transparent;
            position: relative;
        }

        .plan-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .plan-card.recommended {
            border-color: #86c540;
            transform: scale(1.05);
        }

        .plan-card.recommended::before {
            content: '⭐ RECOMMENDED';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(135deg, #86c540, #6e9443);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .plan-name {
            font-size: 1.8rem;
            color: #2c3e50;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .plan-price {
            font-size: 3rem;
            color: #86c540;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }

        .plan-price span {
            font-size: 1.2rem;
            color: #64748b;
            font-weight: 400;
        }

        .plan-description {
            color: #64748b;
            margin-bottom: 2rem;
            line-height: 1.6;
        }

        .plan-features {
            list-style: none;
            padding: 0;
            margin: 2rem 0;
        }

        .plan-features li {
            padding: 0.75rem 0;
            color: #2c3e50;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .plan-features li i {
            color: #86c540;
            font-size: 1.2rem;
        }

        .plan-button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, #86c540, #6e9443);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .plan-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(134, 197, 64, 0.3);
        }

        .plan-button.secondary {
            background: white;
            color: #86c540;
            border: 2px solid #86c540;
        }

        @media (max-width: 768px) {
            .plans-header h1 {
                font-size: 2rem;
            }

            .plans-grid {
                grid-template-columns: 1fr;
            }

            .plan-card.recommended {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <!-- HEADER PLACEHOLDER -->
    <div id="header-placeholder"></div>

    <!-- SPACER TO PUSH CONTENT BELOW FIXED HEADER -->
    <div style="height: 120px;"></div>

    <section class="plans-section">
        <div class="container">
            <div class="plans-header">
                <h1><span class="gradient-text">Subscription Plans</span></h1>
                <p>Choose the perfect plan for your hiring needs. Access qualified teaching professionals and streamline
                    your recruitment process.</p>
            </div>

            <div id="plansContainer" class="plans-grid" data-endpoint="/api/v1/plans/teacher/">
                <div style="grid-column: 1/-1; text-align: center; padding: 40px; color: #64748b;">
                    <i class="fas fa-spinner fa-spin fa-2x"></i>
                    <p style="margin-top:10px;">Loading subscription plans...</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-section">
                    <div class="footer-logo"><img src="tech.png" alt="TechSkillio Logo" class="footer-logo-img"></div>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2025 TechSkillio. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <!-- Payment Modal (will be shown when plan is selected) -->
    <div id="paymentModal" style="display: none;">
        <!-- Modal content will be injected by JavaScript -->
    </div>

    <script src="js/api-config.js"></script>
    <script src="js/auth-manager.js"></script>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <script src="js/plan-selection-modal.js"></script>
    <script src="js/plan-loader.js"></script>
    <script src="script.js"></script>
    <script src="payment-gateway.js"></script>
    <script src="load-header.js"></script>
</body>

</html>
