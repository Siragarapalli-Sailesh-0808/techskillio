<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saved Jobs - TechSkillio</title>
    <link rel="icon" href="favicon.jpg" type="image/png">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .saved-jobs-section {
            padding: 40px 0 60px;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            min-height: calc(100vh - 80px);
        }

        .saved-jobs-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Page Header */
        .page-header {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            border-left: 4px solid #86c540;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .page-header h1 {
            font-size: 28px;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .page-header p {
            color: #64748b;
            font-size: 15px;
        }

        .clear-all-btn {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid #ef4444;
            color: #ef4444;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .clear-all-btn:hover {
            background: #fef2f2;
        }

        /* Jobs Grid */
        .jobs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        /* Job Card */
        .job-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(134, 197, 64, 0.1);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .job-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #86c540, #6e9443);
        }

        .job-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(134, 197, 64, 0.15);
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .company-logo {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #f8fafc, #e2e8f0);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #86c540;
        }

        .bookmark-btn {
            background: #fef2f2;
            border: none;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            color: #ef4444;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .bookmark-btn:hover {
            background: #ef4444;
            color: white;
            transform: scale(1.1);
        }

        .job-title {
            font-size: 18px;
            font-weight: 700;
            color: #2c3e50;
            margin: 15px 0 5px;
        }

        .company-name {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 15px;
        }

        .job-details {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 15px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #64748b;
            font-size: 14px;
        }

        .detail-item i {
            color: #86c540;
            width: 16px;
        }

        .job-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 15px;
        }

        .job-tag {
            background: rgba(134, 197, 64, 0.1);
            color: #86c540;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid rgba(134, 197, 64, 0.2);
        }

        .job-footer {
            display: flex;
            gap: 10px;
            padding-top: 15px;
            border-top: 1px solid #f1f5f9;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            text-align: center;
        }

        .btn-primary {
            background: #86c540;
            color: white;
        }

        .btn-primary:hover {
            background: #6e9443;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: #64748b;
            border: 1px solid #cbd5e1;
        }

        .btn-secondary:hover {
            border-color: #86c540;
            color: #86c540;
        }

        .saved-date {
            color: #94a3b8;
            font-size: 12px;
            margin-top: 10px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        .empty-state i {
            font-size: 80px;
            color: #cbd5e1;
            margin-bottom: 25px;
        }

        .empty-state h3 {
            font-size: 22px;
            color: #2c3e50;
            margin-bottom: 12px;
        }

        .empty-state p {
            color: #64748b;
            margin-bottom: 30px;
            font-size: 15px;
        }

        .empty-state .btn-primary {
            display: inline-block;
            text-decoration: none;
            padding: 12px 30px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .jobs-grid {
                grid-template-columns: 1fr;
            }

            .page-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
        }
    </style>
</head>

<body>
    <!-- LOAD HEADER -->
    <div id="header-placeholder"></div>

    <div style="height: 100px;"></div> <!-- Spacer -->

    <section class="saved-jobs-section">
        <div class="saved-jobs-container">

            <!-- Page Header -->
            <div class="page-header">
                <div>
                    <h1><i class="fas fa-bookmark"></i> Saved Jobs</h1>
                    <p>Jobs you've bookmarked for later</p>
                </div>
                <button class="clear-all-btn" onclick="clearAllSaved()" id="clearAllBtn" style="display: none;">
                    <i class="fas fa-trash"></i> Clear All
                </button>
            </div>

            <!-- Jobs Grid -->
            <div class="jobs-grid" id="savedJobsGrid">
                <!-- Jobs will be loaded here -->
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <i class="fas fa-bookmark"></i>
                <h3>No Saved Jobs Yet</h3>
                <p>Start saving jobs that interest you to view them later</p>
                <a href="it-jobs.html" class="action-btn btn-primary">
                    <i class="fas fa-search"></i> Browse Jobs
                </a>
            </div>

        </div>
    </section>

    <!-- LOAD HEADER SCRIPT -->
    <script src="js/api-config.js"></script>
    <script src="load-header.js"></script>

    <script>
        let savedJobs = [];

        document.addEventListener('DOMContentLoaded', function () {
            loadSavedJobs();
        });

        function loadSavedJobs() {
            // Get saved jobs from localStorage
            const saved = localStorage.getItem('savedJobs');
            savedJobs = saved ? JSON.parse(saved) : getSampleSavedJobs();

            // Save to localStorage if using sample data
            if (!saved) {
                localStorage.setItem('savedJobs', JSON.stringify(savedJobs));
            }

            displaySavedJobs();
        }

        function displaySavedJobs() {
            const grid = document.getElementById('savedJobsGrid');
            const emptyState = document.getElementById('emptyState');
            const clearBtn = document.getElementById('clearAllBtn');

            if (savedJobs.length === 0) {
                grid.innerHTML = '';
                emptyState.style.display = 'block';
                clearBtn.style.display = 'none';
                return;
            }

            emptyState.style.display = 'none';
            clearBtn.style.display = 'block';

            grid.innerHTML = savedJobs.map(job => createJobCard(job)).join('');
        }

        function createJobCard(job) {
            return `
                <div class="job-card">
                    <div class="job-header">
                        <div class="company-logo">
                            <i class="${job.icon}"></i>
                        </div>
                        <button class="bookmark-btn" onclick="removeBookmark('${job.id}')" title="Remove bookmark">
                            <i class="fas fa-bookmark"></i>
                        </button>
                    </div>
                    
                    <h3 class="job-title">${job.title}</h3>
                    <div class="company-name">
                        <i class="fas fa-building"></i> ${job.company}
                    </div>
                    
                    <div class="job-details">
                        <div class="detail-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <span>${job.location}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-money-bill-wave"></i>
                            <span>${job.salary}</span>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-briefcase"></i>
                            <span>${job.experience}</span>
                        </div>
                    </div>
                    
                    <div class="job-tags">
                        ${job.skills.slice(0, 3).map(skill => `<span class="job-tag">${skill}</span>`).join('')}
                    </div>
                    
                    <div class="saved-date">
                        <i class="fas fa-clock"></i> Saved ${formatDate(job.savedDate)}
                    </div>
                    
                    <div class="job-footer">
                        <button class="action-btn btn-primary" onclick="viewJobDetails('${job.id}')">
                            <i class="fas fa-eye"></i> View Details
                        </button>
                        <button class="action-btn btn-secondary" onclick="applyNow('${job.id}')">
                            <i class="fas fa-paper-plane"></i> Apply
                        </button>
                    </div>
                </div>
            `;
        }

        function removeBookmark(jobId) {
            if (confirm('Remove this job from saved jobs?')) {
                savedJobs = savedJobs.filter(job => job.id !== jobId);
                localStorage.setItem('savedJobs', JSON.stringify(savedJobs));
                displaySavedJobs();
            }
        }

        function clearAllSaved() {
            if (confirm('Are you sure you want to remove all saved jobs?')) {
                savedJobs = [];
                localStorage.setItem('savedJobs', JSON.stringify(savedJobs));
                displaySavedJobs();
            }
        }

        function viewJobDetails(jobId) {
            window.location.href = `it-job-details.html?id=${jobId}`;
        }

        function applyNow(jobId) {
            window.location.href = `it-job-details.html?id=${jobId}#apply`;
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

            if (diffDays === 0) return 'today';
            if (diffDays === 1) return 'yesterday';
            if (diffDays < 7) return `${diffDays} days ago`;
            if (diffDays < 30) return `${Math.floor(diffDays / 7)} weeks ago`;
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
        }

        function getSampleSavedJobs() {
            const userType = localStorage.getItem('userType') || 'it-candidate';

            if (userType === 'it-candidate' || userType === 'it-vendor') {
                return [
                    {
                        id: 'job123',
                        title: 'Senior Frontend Developer',
                        company: 'Google India',
                        icon: 'fab fa-google',
                        location: 'Bangalore',
                        salary: '₹24L - ₹35L',
                        experience: '3-5 years',
                        skills: ['React', 'Redux', 'TypeScript', 'JavaScript'],
                        savedDate: '2025-01-25T10:00:00Z'
                    },
                    {
                        id: 'job456',
                        title: 'Backend Engineer',
                        company: 'Amazon',
                        icon: 'fab fa-aws',
                        location: 'Hyderabad',
                        salary: '₹18L - ₹28L',
                        experience: '2-4 years',
                        skills: ['Node.js', 'AWS', 'Microservices', 'MongoDB'],
                        savedDate: '2025-01-24T14:30:00Z'
                    },
                    {
                        id: 'job789',
                        title: 'Full Stack Developer',
                        company: 'Microsoft',
                        icon: 'fab fa-microsoft',
                        location: 'Bangalore',
                        salary: '₹20L - ₹32L',
                        experience: '3-6 years',
                        skills: ['React', 'Node.js', 'Azure', 'SQL'],
                        savedDate: '2025-01-23T09:15:00Z'
                    },
                    {
                        id: 'job999',
                        title: 'Cloud Architect',
                        company: 'AWS India',
                        icon: 'fab fa-aws',
                        location: 'Mumbai',
                        salary: '₹30L - ₹45L',
                        experience: '5-8 years',
                        skills: ['AWS', 'Kubernetes', 'Terraform', 'Docker'],
                        savedDate: '2025-01-22T16:00:00Z'
                    }
                ];
            } else {
                return [
                    {
                        id: 'pos123',
                        title: 'Mathematics Senior Teacher',
                        company: 'Delhi Public School',
                        icon: 'fas fa-school',
                        location: 'Delhi',
                        salary: '₹45k - ₹60k / month',
                        experience: '3-5 years',
                        skills: ['Mathematics', 'CBSE', 'High School'],
                        savedDate: '2025-01-25T11:00:00Z'
                    },
                    {
                        id: 'pos456',
                        title: 'Biology Teacher',
                        company: 'Oakridge International',
                        icon: 'fas fa-university',
                        location: 'Bangalore',
                        salary: '₹50k - ₹70k / month',
                        experience: '2-4 years',
                        skills: ['Biology', 'IB Curriculum', 'Lab Work'],
                        savedDate: '2025-01-24T15:30:00Z'
                    }
                ];
            }
        }
    </script>
</body>

</html>
