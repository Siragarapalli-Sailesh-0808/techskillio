<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TechSkillio</title>
    <link rel="icon" href="favicon.jpg" type="image/png">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .dashboard-section {
            padding: 40px 0 60px;
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            min-height: calc(100vh - 80px);
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 30px;
        }

        @media (max-width: 992px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }
        }

        /* Sidebar Styles */
        .sidebar-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(134, 197, 64, 0.1);
            margin-bottom: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }

        .sidebar-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: #2c3e50;
            border-bottom: 2px solid #86c540;
            padding-bottom: 10px;
        }

        .user-profile-section {
            text-align: center;
            margin-bottom: 20px;
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #86c540, #6e9443);
            border-radius: 50%;
            margin: 0 auto 0px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            color: white;
            font-weight: 700;
        }

        .user-name {
            color: #2c3e50;
            margin-bottom: 5px;
            font-weight: 600;
        }

        .user-role {
            color: #64748b;
            font-size: 14px;
        }

        .skill-item {
            margin-bottom: 15px;
        }

        .skill-header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-bottom: 5px;
            color: #2c3e50;
        }

        .skill-progress-bg {
            background: #f1f5f9;
            height: 8px;
            border-radius: 4px;
            width: 100%;
            overflow: hidden;
        }

        .skill-progress-fill {
            background: linear-gradient(90deg, #86c540, #6e9443);
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        /* Main Content */
        .welcome-header {
            background: white;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            border-left: 4px solid #86c540;
        }

        .welcome-text h1 {
            font-size: 26px;
            margin-bottom: 8px;
            color: #2c3e50;
        }

        .welcome-text p {
            color: #64748b;
        }

        .stat-badge {
            background: linear-gradient(135deg, #86c540, #6e9443);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        /* Quick Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(134, 197, 64, 0.1);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #86c540;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #64748b;
            font-size: 14px;
        }

        .stat-icon {
            font-size: 24px;
            color: #86c540;
            margin-bottom: 10px;
        }

        /* Content Cards */
        .content-section {
            margin-bottom: 30px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            font-size: 20px;
            color: #2c3e50;
            font-weight: 600;
        }

        .view-all-link {
            color: #86c540;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .view-all-link:hover {
            color: #6e9443;
        }

        /* Item Cards */
        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .item-card {
            background: white;
            border-radius: 16px;
            padding: 25px;
            border: 1px solid rgba(134, 197, 64, 0.1);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .item-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, #86c540, #6e9443);
        }

        .item-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(134, 197, 64, 0.15);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .item-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #f8fafc, #e2e8f0);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #86c540;
        }

        .item-title {
            font-size: 18px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .item-subtitle {
            color: #64748b;
            font-size: 14px;
        }

        .item-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 15px 0;
        }

        .item-tag {
            background: rgba(134, 197, 64, 0.1);
            color: #86c540;
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid rgba(134, 197, 64, 0.2);
        }

        .item-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #f1f5f9;
        }

        .item-meta {
            font-weight: 600;
            color: #2c3e50;
        }

        .item-action-btn {
            background: #86c540;
            color: white;
            padding: 8px 16px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }

        .item-action-btn:hover {
            background: #6e9443;
        }

        /* Action Buttons */
        .action-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px solid #cbd5e1;
            color: #2c3e50;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 10px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            border-color: #86c540;
            color: #86c540;
        }

        .logout-btn {
            background: #ef4444;
            border: none;
            color: white;
        }

        .logout-btn:hover {
            background: #dc2626;
        }

        .add-skill-btn {
            background: rgba(134, 197, 64, 0.1);
            border: 1px dashed #86c540;
            color: #86c540;
        }

        .add-skill-btn:hover {
            background: rgba(134, 197, 64, 0.2);
        }

        /* Menu List */
        .menu-list {
            list-style: none;
            padding: 0;
        }

        .menu-list li {
            margin-bottom: 10px;
        }

        .menu-list a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #f9f9f9;
            color: #2c3e50;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .menu-list a:hover {
            background: #86c540;
            color: white;
        }
    </style>
</head>

<body>
    <script src="js/route-guard.js" data-required-role="user"></script>
    <!-- LOAD HEADER -->
    <div id="header-placeholder"></div>

    <div style="height: 100px;"></div> <!-- Spacer -->

    <section class="dashboard-section">
        <div class="dashboard-container">

            <!-- LEFT SIDEBAR -->
            <div class="sidebar">
                <!-- User Profile Summary -->
                <div class="sidebar-card">
                    <div class="user-profile-section">
                        <div class="user-avatar" id="userAvatar">RK</div>
                        <h3 class="user-name" id="userName">User</h3>
                        <p class="user-role" id="userRole">Loading...</p>
                    </div>

                    <button class="action-btn" onclick="editProfile()">
                        <i class="fas fa-user-edit"></i> Edit Profile
                    </button>
                    <button class="logout-btn action-btn" onclick="logoutUser()">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </div>

                <!-- Navigation Menu -->
                <div class="sidebar-card">
                    <div class="sidebar-title">Navigation</div>
                    <ul class="menu-list">
                        <li><a href="dashboard.html"><i class="fas fa-home"></i> Dashboard</a></li>
                        <li><a href="it-jobs.html" id="browseJobsLink"><i class="fas fa-briefcase"></i> Browse Jobs</a>
                        </li>
                        <li><a href="my-applications.html"><i class="fas fa-paper-plane"></i> My Applications</a></li>
                        <li><a href="saved-jobs.html"><i class="fas fa-bookmark"></i> Saved Jobs</a></li>
                        <li><a href="notifications.html"><i class="fas fa-bell"></i> Notifications</a></li>
                        <li><a href="profile.html"><i class="fas fa-user"></i> Profile</a></li>
                    </ul>
                </div>

                <!-- Skills/Qualifications -->
                <div class="sidebar-card" id="skillsSection">
                    <div class="sidebar-title" id="skillsTitle">Skills</div>
                    <div id="skillsList">
                        <!-- Skills will be loaded dynamically -->
                    </div>
                    <button class="add-skill-btn action-btn" onclick="addSkill()">
                        <i class="fas fa-plus"></i> Add Skill
                    </button>
                </div>
            </div>

            <!-- MAIN CONTENT -->
            <div class="main-content">

                <!-- Welcome Header -->
                <div class="welcome-header">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div class="welcome-text">
                            <h1 id="welcomeTitle">Dashboard Overview</h1>
                            <p id="welcomeSubtitle">Welcome back! Here's what's happening.</p>
                        </div>
                        <div>
                            <span class="stat-badge">
                                <i class="fas fa-check-circle"></i> <span id="statusBadge">Active</span>
                            </span>
                        </div>
                    </div>
                </div>

                <!-- Quick Stats -->
                <div class="stats-grid" id="statsGrid">
                    <!-- Stats will be loaded dynamically -->
                </div>

                <!-- Main Content Section -->
                <div class="content-section">
                    <div class="section-header">
                        <h2 id="mainSectionTitle">Recommended Items</h2>
                        <a href="#" class="view-all-link" id="viewAllLink">View All →</a>
                    </div>

                    <div class="items-grid" id="itemsGrid">
                        <!-- Items will be loaded dynamically -->
                    </div>
                </div>

            </div>
        </div>
    </section>

    <!-- LOAD HEADER SCRIPT -->
    <script src="js/api-config.js"></script>
    <script src="load-header.js"></script>
    <script src="js/dashboard-config.js"></script>

    <script>
        // Dashboard initialization
        document.addEventListener('DOMContentLoaded', function () {
            initializeDashboard();
        });

        function initializeDashboard() {
            // Get user type from storage
            const userType = localStorage.getItem('userType') || sessionStorage.getItem('userType') || 'it-candidate';
            const userProfile = JSON.parse(localStorage.getItem('userProfile') || sessionStorage.getItem('userProfile') || '{}');

            // Get configuration for user type
            const config = dashboardConfig[userType] || dashboardConfig['it-candidate'];

            // Update user profile section
            updateUserProfile(userProfile, config);

            // Update skills/qualifications section
            updateSkillsSection(config);

            // Update welcome section
            updateWelcomeSection(config);

            // Update stats
            updateStats(config);

            // Load main content
            loadMainContent(config, userType);

            // Update browse jobs link based on user type
            updateBrowseJobsLink(userType);
        }

        function updateBrowseJobsLink(userType) {
            const browseJobsLink = document.getElementById('browseJobsLink');
            if (browseJobsLink) {
                if (userType === 'it-candidate' || userType === 'it-vendor') {
                    browseJobsLink.href = 'it-jobs.html';
                } else {
                    browseJobsLink.href = 'teacher-jobs.html';
                }
            }
        }

        function updateUserProfile(userProfile, config) {
            const userName = userProfile.fullName || 'User';
            const initials = userName.split(' ').map(n => n[0]).join('').toUpperCase().substring(0, 2);

            document.getElementById('userName').textContent = userName;
            document.getElementById('userAvatar').textContent = initials;
            document.getElementById('userRole').textContent = config.labels.userRole;
        }

        function updateSkillsSection(config) {
            document.getElementById('skillsTitle').textContent = config.labels.skills;

            // Sample skills - in production, load from API
            const skills = config.sampleSkills || [];
            const skillsList = document.getElementById('skillsList');
            skillsList.innerHTML = '';

            skills.forEach(skill => {
                const skillItem = document.createElement('div');
                skillItem.className = 'skill-item';
                skillItem.innerHTML = `
                    <div class="skill-header">
                        <span>${skill.name}</span>
                        <span>${skill.level}%</span>
                    </div>
                    <div class="skill-progress-bg">
                        <div class="skill-progress-fill" style="width: ${skill.level}%;"></div>
                    </div>
                `;
                skillsList.appendChild(skillItem);
            });
        }

        function updateWelcomeSection(config) {
            document.getElementById('welcomeTitle').textContent = config.labels.welcomeTitle;
            document.getElementById('welcomeSubtitle').textContent = config.labels.welcomeSubtitle;
            document.getElementById('statusBadge').textContent = config.labels.statusBadge;
        }

        function updateStats(config) {
            const statsGrid = document.getElementById('statsGrid');
            statsGrid.innerHTML = '';

            config.stats.forEach(stat => {
                const statCard = document.createElement('div');
                statCard.className = 'stat-card';
                statCard.innerHTML = `
                    <div class="stat-icon"><i class="${stat.icon}"></i></div>
                    <div class="stat-number">${stat.value}</div>
                    <div class="stat-label">${stat.label}</div>
                `;
                statsGrid.appendChild(statCard);
            });
        }

        function loadMainContent(config, userType) {
            document.getElementById('mainSectionTitle').textContent = config.labels.mainSection;
            document.getElementById('viewAllLink').href = config.viewAllLink;

            // Load items from API
            fetchDashboardItems(config.apiEndpoints.main, userType);
        }

        async function fetchDashboardItems(endpoint, userType) {
            // In production, this would be an actual API call
            // For now, show sample data
            const itemsGrid = document.getElementById('itemsGrid');
            itemsGrid.innerHTML = '';

            const sampleItems = getSampleItems(userType);

            sampleItems.forEach(item => {
                const itemCard = document.createElement('div');
                itemCard.className = 'item-card';
                itemCard.innerHTML = `
                    <div class="item-header">
                        <div>
                            <h3 class="item-title">${item.title}</h3>
                            <div class="item-subtitle">${item.subtitle}</div>
                        </div>
                        <div class="item-icon"><i class="${item.icon}"></i></div>
                    </div>
                    <div class="item-tags">
                        ${item.tags.map(tag => `<span class="item-tag">${tag}</span>`).join('')}
                    </div>
                    <div class="item-footer">
                        <div class="item-meta">${item.meta}</div>
                        <button class="item-action-btn" onclick="handleItemAction('${item.id}')">${item.actionLabel}</button>
                    </div>
                `;
                itemsGrid.appendChild(itemCard);
            });
        }

        function getSampleItems(userType) {
            const items = {
                'it-candidate': [
                    {
                        id: '1',
                        title: 'Senior Frontend Developer',
                        subtitle: 'Google via TechSkillio',
                        icon: 'fab fa-google',
                        tags: ['React', 'Redux', 'TypeScript'],
                        meta: '₹24L - ₹35L',
                        actionLabel: 'View Details'
                    },
                    {
                        id: '2',
                        title: 'Backend Engineer',
                        subtitle: 'Amazon Development Center',
                        icon: 'fab fa-aws',
                        tags: ['Node.js', 'AWS', 'Microservices'],
                        meta: '₹18L - ₹28L',
                        actionLabel: 'View Details'
                    }
                ],
                'teacher-candidate': [
                    {
                        id: '1',
                        title: 'Mathematics Senior Teacher',
                        subtitle: 'Delhi Public School',
                        icon: 'fas fa-school',
                        tags: ['High School', 'CBSE', 'Full-time'],
                        meta: '₹45k - ₹60k / mo',
                        actionLabel: 'Apply Now'
                    },
                    {
                        id: '2',
                        title: 'Biology Teacher',
                        subtitle: 'Oakridge International',
                        icon: 'fas fa-university',
                        tags: ['IB Curriculum', 'Experienced', 'Full-time'],
                        meta: '₹50k - ₹70k / mo',
                        actionLabel: 'Apply Now'
                    }
                ],
                'school-employer': [
                    {
                        id: '1',
                        title: 'Mathematics Teacher',
                        subtitle: 'Posted 3 days ago',
                        icon: 'fas fa-chalkboard-teacher',
                        tags: ['6 Applications', 'Active', 'Full-time'],
                        meta: 'View Candidates',
                        actionLabel: 'Manage'
                    },
                    {
                        id: '2',
                        title: 'English Teacher',
                        subtitle: 'Posted 1 week ago',
                        icon: 'fas fa-book-reader',
                        tags: ['5 Applications', 'Active', 'Part-time'],
                        meta: 'View Candidates',
                        actionLabel: 'Manage'
                    }
                ]
            };

            return items[userType] || items['it-candidate'];
        }

        function handleItemAction(itemId) {
            const userType = localStorage.getItem('userType') || 'it-candidate';

            if (userType === 'it-candidate' || userType === 'it-vendor') {
                window.location.href = `it-job-details.html?id=${itemId}`;
            } else if (userType === 'teacher-candidate' || userType === 'teacher-nonteaching') {
                window.location.href = `teacher-job-details.html?id=${itemId}`;
            } else {
                // For employers, show application details
                window.location.href = `dashboard.html#application-${itemId}`;
            }
        }

        function editProfile() {
            window.location.href = 'profile.html';
        }

        function addSkill() {
            window.location.href = 'profile.html#skills';
        }

        function logoutUser() {
            localStorage.clear();
            sessionStorage.clear();
            window.location.href = 'login.html';
        }
    </script>
</body>

</html>
