<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Non-Teaching Candidate Dashboard - TechSkillio</title>
    <link rel="icon" href="favicon.jpg" type="image/png">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .dashboard-section {
            padding: 40px 0 60px;
            background: #f5f7fa;
            min-height: calc(100vh - 80px);
        }

        /* Dashboard specific layout */
        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 30px;
        }

        @media (max-width: 992px) {
            .dashboard-container {
                grid-template-columns: 1fr;
            }

            .sidebar {
                margin-top: 30px;
                order: 2;
            }
        }

        @media (max-width: 576px) {
            .dashboard-section {
                padding: 20px 0 40px;
            }

            .dashboard-container {
                padding: 0 15px;
            }

            .welcome-banner {
                padding: 20px;
                flex-direction: column;
                align-items: flex-start;
            }

            .profile-complete-wrapper {
                width: 100%;
                margin-top: 15px;
            }

            .job-card {
                padding: 15px;
                flex-direction: column;
                gap: 15px;
            }

            .job-info {
                flex-direction: row;
                align-items: center;
            }

            .apply-btn {
                width: 100%;
            }

            .sidebar-card {
                padding: 20px;
            }
        }

        /* Welcome Banner */
        .welcome-banner {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .welcome-text h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        .welcome-text p {
            color: #666;
            margin-bottom: 15px;
        }

        .profile-complete-wrapper {
            width: 100%;
            max-width: 400px;
        }

        .progress-bar-bg {
            background: #eee;
            height: 10px;
            border-radius: 5px;
            width: 100%;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar-fill {
            background: #86c540;
            height: 100%;
            border-radius: 5px;
            width: 80%;
            /* Static for now */
        }

        .progress-label {
            font-size: 13px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }

        /* Quick Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        @media (max-width: 768px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        .stat-card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 24px;
            color: #86c540;
            margin-bottom: 15px;
            background: rgba(134, 197, 64, 0.1);
            width: 60px;
            height: 60px;
            line-height: 60px;
            border-radius: 50%;
            display: inline-block;
        }

        .stat-number {
            font-size: 32px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 5px;
        }

        .stat-label {
            color: #666;
            font-size: 14px;
        }

        /* Section Headers */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            font-size: 20px;
            color: #2c3e50;
        }

        .view-all-btn {
            color: #86c540;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
        }

        .view-all-btn:hover {
            text-decoration: underline;
        }

        /* Job Cards */
        .job-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.03);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid #86c540;
            transition: all 0.2s ease;
        }

        .job-card:hover {
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
        }

        .job-info {
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .school-logo {
            width: 50px;
            height: 50px;
            background: #f0f0f0;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #999;
            font-size: 20px;
        }

        .job-details h3 {
            font-size: 18px;
            margin-bottom: 5px;
            color: #fa5560;
        }

        .job-meta {
            font-size: 13px;
            color: #666;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
        }

        .job-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .apply-btn {
            padding: 8px 20px;
            background: #86c540;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
        }

        .apply-btn:hover {
            background: #75b035;
        }

        /* Sidebar Items */
        .sidebar-card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 30px;
        }

        .sidebar-card h3 {
            font-size: 18px;
            margin-bottom: 20px;
            color: #2c3e50;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }

        .interview-card {
            background: #f8fafc;
            border-radius: 8px;
            padding: 15px;
            border-left: 3px solid #3498db;
            margin-bottom: 15px;
        }

        .interview-role {
            font-weight: 700;
            font-size: 15px;
            color: #2c3e50;
            margin-bottom: 5px;
            display: block;
        }

        .interview-time {
            font-size: 13px;
            color: #e67e22;
            font-weight: 600;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .interview-mode {
            font-size: 12px;
            color: #666;
            background: white;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            border: 1px solid #eee;
        }

        .profile-menu-list {
            list-style: none;
            padding: 0;
        }

        .profile-menu-list li {
            margin-bottom: 10px;
        }

        .profile-menu-list a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: #f9f9f9;
            color: #555;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .profile-menu-list a:hover {
            background: #86c540;
            color: white;
        }

        @media (max-width: 480px) {
            .welcome-banner {
                flex-direction: column;
                align-items: flex-start;
                gap: 20px;
            }

            .job-card {
                flex-direction: column;
                gap: 20px;
            }

            .apply-btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <script src="js/route-guard.js" data-required-role="user"></script>
    <!-- LOAD HEADER -->
    <div id="header-placeholder"></div>

    <div style="height: 100px;"></div> <!-- Spacer -->

    <section class="dashboard-section">
        <div class="dashboard-container">

            <!-- MAIN CONTENT COL -->
            <div class="main-content">

                <!-- Welcome Banner -->
                <div class="welcome-banner">
                    <div class="welcome-text">
                        <h1>Welcome back, <span id="userNameDisplay">Candidate</span>!</h1>
                        <p>Track your applications for <span id="roleDisplay">non-teaching</span> roles.</p>
                    </div>

                </div>

                <!-- Stats Grid Removed as per request -->

                <!-- Recommended Jobs -->
                <div class="section-header">
                    <h2>Recommended for you</h2>
                    <a href="teacher-jobs.html" class="view-all-btn">View All Jobs →</a>
                </div>

                <div class="jobs-list" id="jobsListContainer">
                    <!-- Jobs will be loaded here -->
                    <div style="text-align: center; padding: 20px; color: #666;">
                        <i class="fas fa-spinner fa-spin"></i> Loading jobs...
                    </div>
                </div>



                <!-- Applied Positions Removed -->

            </div>

            <!-- SIDEBAR COL -->
            <div class="sidebar">

                <div class="sidebar-card">
                    <h3>User Type</h3>
                    <div
                        style="background: #eff6ff; color: #1e40af; padding: 10px; border-radius: 6px; text-align: center; font-weight: 600;">
                        Non-Teaching Candidate
                    </div>
                </div>

                <!-- Track Application Status Removed -->

                <!-- Upcoming Interviews Removed -->

                <!-- My Profile Menu -->
                <div class="sidebar-card">
                    <h3>My Account</h3>
                    <ul class="profile-menu-list">
                        <li><a href="profile.html"><i class="fas fa-user-circle"></i> View Profile</a></li>
                        <li><a href="profile.html"><i class="fas fa-file-alt"></i> Update Resume</a></li>
                        <li><a href="applied-jobs.html"><i class="fas fa-briefcase"></i> Applied Jobs</a></li>
                        <li><a href="profile.html"><i class="fas fa-cog"></i> Settings</a></li>
                        <li><a href="#" onclick="logoutUser()"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
                    </ul>
                </div>

            </div>
        </div>
    </section>

    <!-- LOAD HEADER SCRIPT -->
    <script src="js/api-config.js"></script>
    <script src="load-header.js"></script>
    <script src="js/api-config.js"></script>
    <script src="js/auth-manager.js"></script>
    <script src="js/job-display-helpers.js"></script>
    <script src="js/job-application-modal.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Load User Info
            const userProfile = JSON.parse(localStorage.getItem('userProfile') || sessionStorage.getItem('userProfile') || '{}');

            // Guard: Redirect if teaching candidate
            if (userProfile.is_teaching_candidate === true) {
                window.location.href = 'teacher-candidate-dashboard.html';
                return;
            }

            if (userProfile.fullName) {
                document.getElementById('userNameDisplay').textContent = userProfile.fullName.split(' ')[0];
            }

            checkAuth();
            loadDashboardData();
        });

        function checkAuth() {
            if (typeof authManager !== 'undefined' && !authManager.isAuthenticated()) {
                window.location.href = 'login.html';
            }
        }

        async function loadDashboardData() {
            try {
                // 1. Fetch Jobs (Teacher Category + Non-Teaching)
                const jobsResponse = await authManager.apiRequest('/api/v1/jobs/jobs/?job_category=teacher&is_teaching_job=false');
                const jobsData = await jobsResponse.json();
                const jobs = Array.isArray(jobsData) ? jobsData : (jobsData.results || []);

                // 2. Fetch Applications
                availableJobs = jobs; // Store globally

                // 2. Fetch Applications
                const appsResponse = await authManager.apiRequest('/api/v1/jobs/applications/');
                const appsData = await appsResponse.json();
                const applications = Array.isArray(appsData) ? appsData : (appsData.results || []);

                // Render
                renderJobs(jobs, applications);

            } catch (error) {
                console.error('Error loading dashboard:', error);
                document.getElementById('jobsListContainer').innerHTML = '<p class="text-danger">Failed to load jobs.</p>';
            }
        }

        let availableJobs = [];

        function renderJobs(jobs, applications) {
            const container = document.getElementById('jobsListContainer');

            // Client-side filtering to be absolutely sure
            const nonTeachingJobs = jobs.filter(job => job.is_teaching_job === false);

            if (nonTeachingJobs.length === 0) {
                container.innerHTML = '<p>No matching non-teaching jobs found at the moment.</p>';
                return;
            }

            container.innerHTML = nonTeachingJobs.map(job => {
                const isApplied = applications.some(app => app.job === job.id || app.job_title === job.title);

                return `
                <div class="job-card" onclick="viewJobDetails(${job.id})" style="cursor: pointer;">
                    <div class="job-info">
                        <div class="school-logo"><i class="fas fa-school"></i></div>
                        <div class="job-details">
                            <h3>${job.title}</h3>
                            <div class="job-meta">
                                <span><i class="fas fa-building"></i> ${job.location || 'Remote'}</span>
                                <span><i class="fas fa-rupee-sign"></i> ${formatSalary(job.salary_min, job.salary_max)}</span>
                            </div>
                        </div>
                    </div>
                     ${isApplied
                        ? '<button class="apply-btn" disabled style="background: #e2e8f0; color: #64748b; cursor: not-allowed;" onclick="event.stopPropagation()">Applied</button>'
                        : `<button class="apply-btn" onclick="applyForJob(${job.id}); event.stopPropagation()">Apply Now</button>`
                    }
                </div>
                `;
            }).join('');
        }

        function getJobForModal(job) {
            return {
                id: job.id,
                title: job.title,
                institution: job.school_name || job.company_name || 'TechSkillio Partner',
                location: job.location,
                salary: formatSalary(job.salary_min, job.salary_max),
                // Pass raw values for modal to format if needed, or pass pre-formatted
                salary_min: job.salary_min,
                salary_max: job.salary_max,
                description: job.description,
                experience_min_years: job.experience_min_years,
                experience_max_years: job.experience_max_years,
                employment_type: job.employment_type,
                work_mode: job.work_mode,
                skills_required: job.skills_required,
                subjects_required: job.subjects_required
            };
        }

        function viewJobDetails(jobId) {
            const job = availableJobs.find(j => j.id === jobId);
            if (job) {
                jobApplicationModal.showJobDetails(getJobForModal(job));
            }
        }

        function applyForJob(jobId) {
            const job = availableJobs.find(j => j.id === jobId);
            if (job) {
                jobApplicationModal.showModal(getJobForModal(job));
            }
        }

        function renderApplications(applications) {
            const container = document.getElementById('applicationsListContainer');
            if (applications.length === 0) {
                container.innerHTML = '<div style="padding: 15px; color: #666; text-align: center;">No active applications</div>';
                return;
            }

            container.innerHTML = applications.slice(0, 5).map(app => `
                 <div class="interview-card"
                    style="border-left-color: ${getStatusColor(app.status)}; background: white; box-shadow: 0 2px 5px rgba(0,0,0,0.05);">
                    <span class="interview-role">${app.job_title || 'Unknown Role'}</span>
                    <div class="interview-time" style="color: #666;"><i class="fas fa-clock"></i> Applied: ${new Date(app.applied_at || app.created_at).toLocaleDateString()}</div>
                    <div
                        style="font-size: 12px; color: ${getStatusColor(app.status)}; font-weight: 600; background: ${getStatusWrapperColor(app.status)}; padding: 2px 6px; border-radius: 4px; display: inline-block; margin-top: 5px;">
                        ${(app.status || 'applied').toUpperCase()}</div>
                </div>
            `).join('');
        }

        function updateStats(applications) {
            // Update "Applications Sent" count (First card)
            const statCards = document.querySelectorAll('.stat-card .stat-number');
            if (statCards.length > 0) statCards[0].textContent = applications.length;
        }



        function logoutUser() {
            if (authManager) authManager.logout();
            else window.location.href = 'login.html';
        }

        // Helpers
        function formatSalary(min, max) {
            if (!min && !max) return 'Not disclosed';
            if (min > 1000) return `${(min / 1000).toFixed(0)}k - ${(max / 1000).toFixed(0)}k / mo`;
            return `${min} - ${max}`;
        }

        function getStatusColor(status) {
            switch ((status || '').toLowerCase()) {
                case 'interview_scheduled': return '#f59e0b';
                case 'rejected': return '#ef4444';
                case 'job_offer': return '#10b981';
                default: return '#3b82f6';
            }
        }

        function getStatusWrapperColor(status) {
            switch ((status || '').toLowerCase()) {
                case 'interview_scheduled': return '#fffbeb';
                case 'rejected': return '#fef2f2';
                case 'job_offer': return '#ecfdf5';
                default: return '#eff6ff';
            }
        }
    </script>
</body>

</html>
