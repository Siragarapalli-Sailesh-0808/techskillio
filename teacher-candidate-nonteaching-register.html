<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Non-Teaching Candidate Registration - TechSkillio</title>
    <link rel="icon" href="favicon.jpg" type="image/png">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .registration-section {
            padding: 60px 0;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            min-height: 100vh;
        }

        .registration-container {
            max-width: 750px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 3rem;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .registration-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .registration-header h1 {
            font-size: 2.2rem;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }

        .signin-link {
            text-align: center;
            margin-bottom: 2rem;
            color: #64748b;
        }

        .signin-link a {
            color: #86c540;
            font-weight: 600;
            text-decoration: none;
        }

        .form-section {
            margin-bottom: 2.5rem;
        }

        .form-section-title {
            font-size: 1.2rem;
            color: #2c3e50;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid #ff8c42;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #2c3e50;
            font-size: 0.95rem;
        }

        .form-group label .required {
            color: #ef4444;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Poppins', sans-serif;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #ff8c42;
            box-shadow: 0 0 0 3px rgba(255, 140, 66, 0.1);
        }

        .hidden {
            display: none;
        }

        .success-message {
            display: none;
            background: linear-gradient(135deg, #ff8c42, #ff6b35);
            color: white;
            padding: 1.5rem;
            border-radius: 12px;
            margin-top: 2rem;
            text-align: center;
        }

        .success-message.show {
            display: block;
            animation: slideDown 0.5s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .registration-container {
                padding: 2rem 1.2rem;
            }

            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div id="header-placeholder"></div>
    <div style="height: 120px;"></div>

    <section class="registration-section">
        <div class="container">
            <div class="registration-container">
                <div class="registration-header">
                    <h1><span class="gradient-text">Non-Teaching</span> Registration</h1>
                    <p>Administrative and support staff positions</p>
                </div>

                <div class="signin-link">
                    Already registered? <a href="login.html">Sign In</a>
                </div>

                <form id="nonTeachingRegistrationForm">
                    <div class="form-section">
                        <h3 class="form-section-title"><i class="fas fa-user"></i> Personal Information</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Full Name <span class="required">*</span></label>
                                <input type="text" name="fullName" required placeholder="Full Name">
                            </div>
                            <div class="form-group">
                                <label>Email Address <span class="required">*</span></label>
                                <input type="email" name="email" required placeholder="email@example.com">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Contact Number <span class="required">*</span></label>
                                <input type="tel" name="phone" required pattern="[0-9]{10}" maxlength="10"
                                    placeholder="10-digit mobile">
                            </div>
                            <div class="form-group">
                                <label>Gender <span class="required">*</span></label>
                                <select name="gender" required>
                                    <option value="">Select Gender</option>
                                    <option value="Male">Male</option>
                                    <option value="Female">Female</option>
                                    <option value="Other">Other</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Date of Birth <span class="required">*</span></label>
                                <input type="date" name="dateOfBirth" required>
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3 class="form-section-title"><i class="fas fa-briefcase"></i> Professional Details</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Position Type <span class="required">*</span></label>
                                <select name="positionType" required id="positionType">
                                    <option value="">Select Position</option>
                                    <option value="Administrative Officer (AO)">Administrative Officer (AO)</option>
                                    <option value="Librarian">Librarian</option>
                                    <option value="Front Office Executive">Front Office Executive</option>
                                    <option value="DTP Operator">DTP Operator</option>
                                    <option value="Lab Assistant">Lab Assistant</option>
                                    <option value="Hostel Warden">Hostel Warden</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <label>Years of Experience <span class="required">*</span></label>
                                <select name="experience" required>
                                    <option value="0">Fresher (0 Years)</option>
                                    <option value="1">1 Year</option>
                                    <option value="2">2 Years</option>
                                    <option value="3">3 Years</option>
                                    <option value="5">5+ Years</option>
                                    <option value="10">10+ Years</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Present Working Experience <span class="required">*</span></label>
                            <textarea name="presentExperience" required rows="3"
                                placeholder="Describe your current role..."></textarea>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3 class="form-section-title"><i class="fas fa-indian-rupee-sign"></i> Job Preferences</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Present Salary (Monthly) <span class="required">*</span></label>
                                <input type="number" name="presentSalary" required placeholder="₹ Current Salary"
                                    min="0">
                            </div>
                            <div class="form-group">
                                <label>Expected Salary (Monthly) <span class="required">*</span></label>
                                <input type="number" name="expectedSalary" required placeholder="₹ Expected Salary"
                                    min="0">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Preferred Work Area/City <span class="required">*</span></label>
                                <input type="text" name="preferredArea" required placeholder="e.g. Hyderabad, Remote">
                            </div>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3 class="form-section-title"><i class="fas fa-file-upload"></i> Attachments</h3>
                        <div class="form-group">
                            <label>Resume Upload <span class="required">*</span></label>
                            <input type="file" name="resume" accept=".pdf,.doc,.docx" required>
                            <small style="color: #64748b;">PDF/Word, Max 2 MB</small>
                        </div>
                    </div>

                    <div class="form-section">
                        <h3 class="form-section-title"><i class="fas fa-lock"></i> Password Setup</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Password <span class="required">*</span></label>
                                <input type="password" name="password" required minlength="8" id="password"
                                    placeholder="Min 8 characters">
                            </div>
                            <div class="form-group">
                                <label>Confirm Password <span class="required">*</span></label>
                                <input type="password" name="confirmPassword" required minlength="8"
                                    id="confirmPassword" placeholder="Re-enter password">
                            </div>
                        </div>
                    </div>

                    <div style="text-align: center; margin-top: 2rem;">
                        <button type="submit"
                            style="background: linear-gradient(135deg, #ff8c42, #ff6b35); padding: 14px 50px; color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; width: 100%;">
                            Submit Registration
                        </button>
                    </div>

                    <div class="success-message" id="successMessage">
                        <h3>Registration Successful!</h3>
                        <p>Redirecting to login...</p>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <script src="js/api-config.js"></script>
    <script src="js/registration-manager.js"></script>
    <script>
        document.getElementById('nonTeachingRegistrationForm').addEventListener('submit', async function (e) {
            e.preventDefault();
            const form = e.target;
            const submitBtn = form.querySelector('button[type="submit"]');

            // Passwords check
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            if (password !== confirmPassword) {
                alert("Passwords don't match!");
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerText = 'Processing...';

            try {
                // Map values to API schema
                const apiData = {
                    is_teaching_candidate: false,
                    full_name: form.elements['fullName'].value,
                    email: form.elements['email'].value,
                    contact_number: '+91-' + form.elements['phone'].value,
                    gender: form.elements['gender'].value.toLowerCase(),
                    dob: form.elements['dateOfBirth'].value,
                    position_type: form.elements['positionType'].value,
                    non_teaching_experience_years: parseInt(form.elements['experience'].value),

                    // NEW FIELDS MAPPED HERE
                    current_salary: parseInt(form.elements['presentSalary'].value) || 0,
                    expected_salary: parseInt(form.elements['expectedSalary'].value) || 0,
                    preferred_cities: [form.elements['preferredArea'].value],
                    current_city: form.elements['preferredArea'].value,

                    experience_text: form.elements['presentExperience'].value,
                    password: password,
                    confirm_password: confirmPassword,
                    available_for_interview: true,
                    joining_date: new Date().toISOString().split('T')[0] // Default to today
                };

                const result = await registrationManager.registerTeacherCandidate(apiData);

                if (result.success) {
                    document.getElementById('successMessage').classList.add('show');
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                } else {
                    alert(result.error || "Registration failed");
                    submitBtn.disabled = false;
                    submitBtn.innerText = 'Submit Registration';
                }
            } catch (err) {
                console.error(err);
                submitBtn.disabled = false;
                submitBtn.innerText = 'Submit Registration';
            }
        });
    </script>
</body>

</html>
